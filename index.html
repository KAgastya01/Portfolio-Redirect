<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Redirecting</title>
    <meta name="description" content="Professional portfolio showcasing projects and experience">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Background orbs -->
        <div class="orbs">
            <div class="orb orb-1"></div>
            <div class="orb orb-2"></div>
            <div class="orb orb-3"></div>
        </div>
        
        <!-- Decorative elements -->
        <div class="decorative-top"></div>
        <div class="decorative-bottom"></div>
        
        <!-- Main content -->
        <div class="content">
            <div class="header">
                <span class="ornament-left">✦</span>
                <h1 class="title">Professional Portfolio</h1>
                <span class="ornament-right">✦</span>
            </div>
            
            <p class="subtitle">Discover my projects and experience</p>
            
            <div class="button-container">
                <a href="https://github.com/KAgastya01" class="gothic-btn" id="enterBtn">
                    <span class="glow"></span>
                    <span class="text">✦ View Portfolio ✦</span>
                </a>
                <noscript>
                    <p style="margin-top: 20px; font-size: 0.9em;">
                        If the redirect doesn't work, <a href="https://github.com/KAgastya01" style="color: #d4af9f; text-decoration: underline;">click here to view my portfolio</a>.
                    </p>
                </noscript>
            </div>
            
            <p class="footer-text">Professional experience in software development and engineering</p>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
